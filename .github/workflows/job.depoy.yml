
name: Deploy

on:
  workflow_call:
    inputs:
      environment: { required: true, type: string }
      config_file: { required: true, type: string }
      branch:      { required: true, type: string }
    secrets:
      GAME_HOST:   { required: true }
      GAME_PORT:   { required: true }
      DEPLOY_USER: { required: true }
      DEPLOY_KEY:  { required: true }
      GAME_USER:   { required: true }

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      deployment: true
    steps:
      - name: Update repo & Restart Luanti
        uses: fifsky/ssh-action@v0.0.6
        with:
          host: ${{ secrets.GAME_HOST }}
          port: ${{ secrets.GAME_PORT }}
          user: ${{ secrets.DEPLOY_USER }}
          key:  ${{ secrets.DEPLOY_KEY }}
          command: |
            sudo -u ${{ secrets.GAME_USER }} bash -c '
              set -e
              cd /srv/luanti/accounts/lord/games/lord/
              echo "Checkout to branch: ${{ inputs.branch }}"
              git checkout ${{ inputs.branch }}
              echo "Pulling updates:"
              git pull --recurse-submodules
              echo "Initializing submodules:"
              git submodule init
              echo "Updating submodules:"
              git submodule update
              echo "Config file update:"
              cp -f ${{ inputs.config_file }} minetest.conf
              echo "Restarting lord service..."
              sudo systemctl restart lord
              echo "Service restarted successfully"
            '
          args: -tt
    
